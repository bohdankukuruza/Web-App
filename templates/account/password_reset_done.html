{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container py-4" style="max-width: 520px;">
  <h2 class="mb-3">{% trans "Check your email" %}</h2>
  <p class="text-muted">
    {% trans "If an account exists with the email you entered, you’ll receive a password reset link shortly." %}
  </p>

  <div class="mt-3 text-center">
    <a class="btn btn-outline-secondary" href="{% url 'account_login' %}">
      {% trans "Back to login" %}
    </a>
  </div>
</div>
{% endblock %}
