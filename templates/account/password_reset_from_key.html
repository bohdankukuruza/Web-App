{% extends "base.html" %}
{% load static %}

{% block title %}Смена пароля{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-form-card">
        <h2 class="text-center">Новый пароль</h2>
        <p class="text-center text-muted mb-4">Пожалуйста, введите ваш новый пароль дважды.</p>

        <form method="post" action=".">
            {% csrf_token %}

            <div class="mb-3">
                <label for="{{ form.new_password1.id_for_label }}" class="form-label">Новый пароль</label>
                {{ form.new_password1 }}
            </div>
            <div class="mb-3">
                <label for="{{ form.new_password2.id_for_label }}" class="form-label">Подтвердите пароль</label>
                {{ form.new_password2 }}
            </div>

            <button type="submit" class="btn btn-primary-custom mt-3">Сменить пароль</button>
        </form>
    </div>
</div>
{% endblock %}
